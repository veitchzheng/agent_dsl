    - data:
        code: "import json\nimport hashlib\nimport time\nimport re\n\ndef main(llm_output,\
          \ existing_tasks):\n    if \"</think>\" in llm_output:\n        llm_output\
          \ = re.sub(r\"<think.*?>.*?</think>\", \"\", llm_output, flags=re.DOTALL\
          \ | re.IGNORECASE).strip()\n    data = json.loads(llm_output)\n\n    raw\
          \ = json.dumps(data, ensure_ascii=False) + str(time.time())\n    task_id\
          \ = hashlib.md5(raw.encode()).hexdigest()[:12]\n\n    data[\"id\"] = task_id\n\
          \    data[\"created_at\"] = time.strftime(\"%Y-%m-%d %H:%M\")\n    data[\"\
          status\"] = \"pending\"\n\n    try:\n        tasks = json.loads(existing_tasks)\
          \ if existing_tasks else []\n    except:\n        tasks = []\n    tasks.append(data)\n\
          \n    card = format_task_card(data)\n\n    return {\n        \"task_card\"\
          : card,\n        \"updated_task_list\": json.dumps(tasks, ensure_ascii=False),\n\
          \        \"task_count\": len(tasks)\n    }\n\n\ndef format_task_card(task):\n\
          \    priority_map = {\n        \"urgent\": (\"\U0001F534 紧急\", \"#FF0000\"\
          ),\n        \"high\": (\"\U0001F7E0 高优先级\", \"#FF6B00\"),\n        \"medium\"\
          : (\"\U0001F7E1 中等\", \"#FFB800\"),\n        \"low\": (\"\U0001F7E2 低优先级\"\
          , \"#00C853\")\n    }\n    category_map = {\n        \"work\": \"\U0001F4BC\
          \ 工作\",\n        \"personal\": \"\U0001F464 个人\",\n        \"study\": \"\
          \U0001F4DA 学习\",\n        \"meeting\": \"\U0001F91D 会议\",\n        \"other\"\
          : \"\U0001F4CB 其他\"\n    }\n    status_map = {\n        \"pending\": \"\
          ⏳ 待处理\",\n        \"in_progress\": \"\U0001F504 进行中\",\n        \"done\"\
          : \"✅ 已完成\",\n        \"cancelled\": \"❌ 已取消\"\n    }\n\n    p_label, _\
          \ = priority_map.get(task.get(\"priority\", \"medium\"), priority_map[\"\
          medium\"])\n    c_label = category_map.get(task.get(\"category\", \"other\"\
          ), category_map[\"other\"])\n    s_label = status_map.get(task.get(\"status\"\
          , \"pending\"), status_map[\"pending\"])\n\n    lines = []\n    lines.append(\"\
          ╔══════════════════════════════════════╗\")\n    lines.append(\"║  \U0001F4CC\
          \ 事项卡片                        ║\")\n    lines.append(\"╠══════════════════════════════════════╣\"\
          )\n    lines.append(\"║                                      ║\")\n    lines.append(f\"\
          ║  \U0001F3F7️  标题：{task.get('title', '未命名')}\")\n    lines.append(f\"║\
          \  \U0001F4C2 分类：{c_label}\")\n    lines.append(f\"║  \U0001F6A9 优先级：{p_label}\"\
          )\n    lines.append(f\"║  \U0001F4CA 状态：{s_label}\")\n    lines.append(f\"\
          ║  \U0001F194 ID：{task.get('id', 'N/A')}\")\n    lines.append(f\"║  \U0001F550\
          \ 创建：{task.get('created_at', 'N/A')}\")\n\n    deadline = task.get(\"deadline\"\
          )\n    if deadline:\n        lines.append(f\"║  ⏰ 截止：{deadline}\")\n\n \
          \   lines.append(\"║                                      ║\")\n    lines.append(\"\
          ╠══════════════════════════════════════╣\")\n    lines.append(\"║  \U0001F4DD\
          \ 描述：\")\n    desc = task.get(\"description\", \"无\")\n    max_width = 30\n\
          \    for i in range(0, len(desc), max_width):\n        chunk = desc[i:i+max_width]\n\
          \        lines.append(f\"║     {chunk}\")\n\n    tags = task.get(\"tags\"\
          , [])\n    if tags:\n        lines.append(f\"║  \U0001F3F7️  标签：{' | '.join(tags)}\"\
          )\n\n    stakeholders = task.get(\"stakeholders\", [])\n    if stakeholders:\n\
          \        lines.append(f\"║  \U0001F465 相关人员：{', '.join(stakeholders)}\"\
          )\n\n    subtasks = task.get(\"subtasks\", [])\n    if subtasks:\n     \
          \   lines.append(\"║  \U0001F4CB 子任务：\")\n        for i, st in enumerate(subtasks,\
          \ 1):\n            lines.append(f\"║     {i}. {st}\")\n\n    notes = task.get(\"\
          notes\")\n    if notes:\n        lines.append(f\"║  \U0001F4AC 备注：{notes}\"\
          )\n\n    lines.append(\"║                                      ║\")\n  \
          \  lines.append(\"╚══════════════════════════════════════╝\")\n\n    return\
          \ \"\\n\".join(lines)"
        code_language: python3
