          | \U0001F525 紧急程度 | **{urgency.get('level', '')}** | {urgency.get('reason',\
          \ '')} |\")\n    lines.append(f\"| ⭐ 重要程度 | **{importance.get('level', '')}**\
          \ | {importance.get('reason', '')} |\")\n    lines.append(f\"| \U0001F4C2\
          \ 事项类型 | **{item_type.get('category', '')}** | {item_type.get('reason',\
          \ '')} |\")\n    lines.append(f\"| \U0001F6A8 处理优先级 | **{priority.get('level',\
          \ '')}** | {priority.get('reason', '')} |\")\n    lines.append(\"\")\n \
          \   lines.append(f\"⏱️ **建议处理时效**：{timeline}\")\n    lines.append(\"\")\n\
          \    lines.append(f\"\U0001F4A1 **处理建议**：{suggestion}\")\n\n    formatted\
          \ = \"\\n\".join(lines)\n    return {\"formatted_result\": formatted}"
