          \    match = re.search(r'```(?:json)?\\s*\\n?(.*?)\\n?```', text, re.DOTALL)\n\
          \    if match:\n        text = match.group(1).strip()\n    if not text.startswith('{'):\n\
          \        start = text.find('{')\n        end = text.rfind('}')\n       \
          \ if start != -1 and end != -1:\n            text = text[start:end+1]\n\
          \    data = json.loads(text)\n    return {\"parsed_json\": json.dumps(data,\
          \ ensure_ascii=False)}"
